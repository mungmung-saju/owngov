var SCREENS = ['home', 'form', 'results', 'detail'];
function show(name) {

    var el = document.getElementById('screen-' + s);

}

function renderOptionGroup() {
  var group = document.getElementById('opt-group');
  if (!group) return;
  var isSubsidy = state.category === 'subsidy';
  var opts = isSubsidy ? BIZ_OPTIONS : HOUSING_OPTIONS;
  var sel = isSubsidy ? state.bizType : state.housing;
  group.innerHTML = opts.map(function (o) { return optionButtonHTML(o, sel === o.id); }).join('');
  Array.prototype.forEach.call(group.querySelectorAll('.opt-btn'), function (btn) {
    btn.addEventListener('click', function (e) {
      e.preventDefault();
      var id = btn.getAttribute('data-opt');
      if (isSubsidy) state.bizType = id; else state.housing = id;
      renderOptionGroup();
      refreshResultsButton();
    });
  });
}

function populateSigungu() {
  var sel = document.getElementById('sel-sigungu');
  if (!sel) return;
  var list = state.sido ? REGIONS[state.sido] : [];
  var disabled = !state.sido;
  sel.disabled = disabled;
  sel.className = 'w-full appearance-none rounded-2xl border-2 py-4 pl-5 pr-12 text-lg font-medium transition focus:outline-none focus:ring-4 focus:ring-blue-100 ' + (disabled ? 'cursor-not-allowed border-slate-200 bg-slate-100 text-slate-400' : (state.sigungu ? 'border-blue-500 bg-white text-slate-900' : 'border-slate-200 bg-white text-slate-400 hover:border-blue-300'));
  var ph = disabled ? '시 / 도를 먼저 선택' : '시 / 군 / 구 선택';
  sel.innerHTML = '<option value="">' + ph + '</option>' + list.map(function (g) { return '<option value="' + g + '"' + (state.sigungu===g?' selected':'') + '>' + g + '</option>'; }).join('');
  sel.onchange = function (e) {
    state.sigungu = e.target.value;
    sel.className = 'w-full appearance-none rounded-2xl border-2 py-4 pl-5 pr-12 text-lg font-medium transition focus:outline-none focus:ring-4 focus:ring-blue-100 ' + (state.sigungu ? 'border-blue-500 bg-white text-slate-900' : 'border-slate-200 bg-white text-slate-400 hover:border-blue-300');
  };
}

function renderKeywords() {
  var box = document.getElementById('kw-chips');
  if (!box) return;
  box.innerHTML = state.keywords.map(function (kw) {
    return '<span class="flex items-center gap-2 rounded-full bg-blue-600 py-2.5 pl-5 pr-3 text-lg font-semibold text-white">' + kw + '<button type="button" data-kw="' + kw + '" class="kw-del flex h-6 w-6 items-center justify-center rounded-full bg-blue-500 transition hover:bg-blue-400" aria-label="' + kw + ' 삭제">' + icon('x', {size:16, sw:3}) + '</button></span>';
  }).join('');
  Array.prototype.forEach.call(box.querySelectorAll('.kw-del'), function (btn) {
    btn.addEventListener('click', function (e) {
      e.preventDefault();
      var kw = btn.getAttribute('data-kw');
      state.keywords = state.keywords.filter(function (k) { return k !== kw; });
      renderKeywords();
    });
  });
}

function formValid() { return state.category === 'subsidy' ? state.bizType !== null : state.housing !== null; }
function refreshResultsButton() {
  var btn = document.getElementById('btn-results');
  var help = document.getElementById('form-help');
  if (!btn) return;
  var valid = formValid();
  btn.disabled = !valid;
  btn.className = 'flex w-full items-center justify-center gap-2 rounded-2xl py-5 text-xl font-bold transition focus:outline-none focus:ring-4 focus:ring-blue-200 ' + (valid ? 'bg-blue-600 text-white hover:bg-blue-700' : 'cursor-not-allowed bg-slate-200 text-slate-400');
  if (help) {
    if (valid) { help.classList.add('hidden'); }
    else { help.classList.remove('hidden'); help.textContent = state.category === 'subsidy' ? '사업자 구분을 선택해주세요.' : '주거 상황을 선택해주세요.'; }
  }
}

  if (!box) return;
  if (state.resultsSubscribed) {
    box.innerHTML = '<div class="fade-up flex flex-col items-center text-center"><div class="mb-4 flex h-16 w-16 items-center justify-center rounded-full bg-blue-600">' + icon('check', {size:36, sw:3, cls:'text-white'}) + '</div><h3 class="text-2xl font-bold text-slate-900">알림 신청이 완료되었습니다!</h3><p class="mt-2 text-lg leading-relaxed text-slate-600">' + regionStr() + ' · 만 ' + age() + '세 조건에 맞는 새 공고가 열리면<br class="hidden sm:block"> 가장 먼저 알려드릴게요.</p><button type="button" id="cta-home" class="mt-6 flex items-center justify-center gap-2 rounded-2xl border-2 border-slate-200 bg-white px-6 py-3.5 text-lg font-semibold text-slate-700 transition hover:border-blue-300 focus:outline-none focus:ring-4 focus:ring-blue-100">' + icon('home', {size:20}) + '처음으로 돌아가기</button></div>';
    document.getElementById('cta-home').addEventListener('click', function (e) { e.preventDefault(); show('home'); });
  } else {
    box.innerHTML = '<div class="text-center"><h3 class="text-xl font-bold text-slate-900">이 조건의 새 공고, 놓치지 마세요</h3><p class="mt-2 text-base leading-relaxed text-slate-500">위 조건에 맞는 공고가 새로 열릴 때마다 알림으로 받아볼 수 있어요.</p><button type="button" id="cta-sub" class="mt-5 flex w-full items-center justify-center gap-2 rounded-2xl bg-blue-600 py-5 text-xl font-bold text-white transition hover:bg-blue-700 focus:outline-none focus:ring-4 focus:ring-blue-200">' + icon('bell', {size:24}) + '맞춤 알림 신청하기</button></div>';
    document.getElementById('cta-sub').addEventListener('click', function (e) { e.preventDefault(); state.resultsSubscribed = true; renderResultsCTA(); });
  }
}

/* ---------- 상세 페이지 ---------- */
function showDetailPage(card) {
  card = Object.assign({}, card, { category: state.category });
  state.selectedCard = card;
  state.detailSubscribed = false;
  state.detailAnswers = {};
  renderDetail();
  show('detail');
}

function renderDetail() {
  var card = state.selectedCard;
  var detail = getDetail(card);
  var link = getLink(card);
  var c = COLOR[card.color];

  var tags = [filterTag(), '만 ' + age() + '세', regionStr()].filter(Boolean).map(function (t) {
    return '<span class="rounded-full bg-blue-500/60 px-3 py-1.5 text-base font-semibold text-white">' + t + '</span>';
  }).join('');

  var highlights = detail.highlights.map(function (h) {
    return '<div class="rounded-2xl border-2 border-slate-100 bg-white px-4 py-4"><div class="flex items-center gap-1.5 text-base font-medium text-slate-500">' + icon(h.icon, {size:18, cls:'text-blue-500'}) + h.label + '</div><div class="mt-1.5 text-xl font-bold leading-snug text-slate-900">' + h.value + '</div></div>';
  }).join('');

  var tableHTML = '';
  if (detail.table) {
    var heads = detail.table.headers.map(function (h) { return '<div class="px-3 py-3">' + h + '</div>'; }).join('');
    var rows = detail.table.rows.map(function (row, ri) {
      var cells = row.map(function (cell, ci) { return '<div class="px-3 py-3.5 leading-snug ' + (ci === 0 ? 'font-bold text-slate-800' : 'font-medium text-slate-600') + '">' + cell + '</div>'; }).join('');
      return '<div class="grid items-center text-center text-lg ' + (ri % 2 ? 'bg-slate-50' : 'bg-white') + '" style="grid-template-columns:repeat(' + row.length + ',minmax(0,1fr))">' + cells + '</div>';
    }).join('');
    var note = detail.table.note ? '<p class="mt-2 flex items-start gap-1.5 text-base text-slate-500">' + icon('info', {size:18, cls:'mt-0.5 shrink-0 text-slate-400'}) + detail.table.note + '</p>' : '';
    tableHTML = '<section><h2 class="mb-4 flex items-center gap-2 text-2xl font-bold text-slate-900">' + icon('clipboard', {size:24, cls:'text-blue-600'}) + detail.table.title + '</h2><div class="overflow-hidden rounded-2xl border-2 border-slate-100"><div class="grid bg-blue-600 text-center text-lg font-bold text-white" style="grid-template-columns:repeat(' + detail.table.headers.length + ',minmax(0,1fr))">' + heads + '</div>' + rows + '</div>' + note + '</section>';
  }

  var reqs = detail.requirements.map(function (r) {
    return '<li class="flex items-start gap-3 rounded-2xl bg-slate-50 px-5 py-4"><span class="mt-0.5 flex h-7 w-7 shrink-0 items-center justify-center rounded-full bg-blue-600 text-white">' + icon('check', {size:16, sw:3}) + '</span><span class="text-lg leading-relaxed text-slate-700">' + r + '</span></li>';
  }).join('');

  var stepsHTML = '';
  if (detail.steps) {
    var steps = detail.steps.map(function (s, i) { return '<li class="flex items-start gap-3"><span class="mt-0.5 flex h-8 w-8 shrink-0 items-center justify-center rounded-full bg-blue-100 text-lg font-bold text-blue-700">' + (i + 1) + '</span><span class="pt-0.5 text-lg leading-relaxed text-slate-700">' + s + '</span></li>'; }).join('');
    stepsHTML = '<section><h2 class="mb-4 flex items-center gap-2 text-2xl font-bold text-slate-900">' + icon('doc', {size:24, cls:'text-blue-600'}) + '신청 방법</h2><ol class="space-y-3">' + steps + '</ol>'
      + '<a href="' + link.url + '" target="_blank" rel="noopener noreferrer" class="mt-4 flex w-full items-center justify-center gap-2 rounded-2xl border-2 border-blue-200 py-4 text-lg font-bold text-blue-700 transition hover:bg-blue-50 focus:outline-none focus:ring-4 focus:ring-blue-100">' + link.site + '에서 신청하기 ' + icon('extlink', {size:20, sw:2.5}) + '</a></section>';
  }

  document.getElementById('screen-detail').innerHTML =
    '<button type="button" id="detail-back" class="mb-5 flex items-center gap-1.5 text-lg font-semibold text-slate-500 transition hover:text-blue-600 focus:outline-none">' + icon('arrowLeft', {size:22}) + '결과 목록으로</button>'
    + '<div class="fade-up overflow-hidden rounded-3xl bg-white shadow-xl shadow-blue-900/5 ring-1 ring-slate-200">'
    +   '<div class="bg-blue-600 px-8 py-8 sm:px-10">'
    +     '<span class="inline-block rounded-full px-3 py-1 text-sm font-bold ' + c.chip + '">' + card.tag + '</span>'
    +     '<div class="mt-3 flex items-start justify-between gap-3"><h1 class="text-3xl font-bold leading-snug text-white">' + card.title + '</h1>'
    +       '<a href="' + link.url + '" target="_blank" rel="noopener noreferrer" title="' + link.site + ' 공식 사이트로 이동" class="hidden shrink-0 items-center gap-1.5 rounded-full bg-white px-4 py-2.5 text-base font-bold text-blue-700 shadow-sm transition hover:bg-blue-50 focus:outline-none focus:ring-4 focus:ring-blue-300 sm:flex">공식 신청 사이트 ' + icon('extlink', {size:18, sw:2.5}) + '</a></div>'
    +     '<div class="mt-2 flex flex-wrap items-center gap-x-3 gap-y-2"><p class="text-base font-medium text-blue-100">주관 · ' + card.agency + '</p>'
    +       '<a href="' + link.url + '" target="_blank" rel="noopener noreferrer" title="' + link.site + ' 공식 사이트로 이동" class="flex items-center gap-1.5 rounded-full bg-white px-4 py-2 text-base font-bold text-blue-700 shadow-sm transition hover:bg-blue-50 focus:outline-none focus:ring-4 focus:ring-blue-300 sm:hidden">사이트 바로가기 ' + icon('extlink', {size:18, sw:2.5}) + '</a></div>'
    +     '<div class="mt-4 flex flex-wrap gap-2">' + tags + '</div></div>'
    +   '<div class="space-y-10 px-7 py-9 sm:px-9">'
    +     '<p class="rounded-2xl bg-blue-50 px-5 py-4 text-lg leading-relaxed text-slate-700">' + detail.intro + '</p>'
    +     '<section><h2 class="mb-4 flex items-center gap-2 text-2xl font-bold text-slate-900">' + icon('info', {size:24, cls:'text-blue-600'}) + '한눈에 보기</h2><div class="grid grid-cols-2 gap-3">' + highlights + '</div></section>'
    +     tableHTML
    +     '<section><h2 class="mb-4 flex items-center gap-2 text-2xl font-bold text-slate-900">' + icon('badge', {size:24, cls:'text-blue-600'}) + '상세 자격 요건</h2><ul class="space-y-3">' + reqs + '</ul></section>'
    +     stepsHTML
    +     '<section class="rounded-2xl bg-blue-50/70 px-5 py-6"><h2 class="mb-1 flex items-center gap-2 text-2xl font-bold text-slate-900">' + icon('clipboard', {size:24, cls:'text-blue-600'}) + '나의 자격 자가진단</h2><p id="check-progress" class="mb-5 text-base text-slate-500"></p><div id="check-list" class="space-y-3"></div><div id="check-feedback"></div></section>'
    +   '</div>'
    +   '<div id="detail-cta" class="border-t border-slate-100 bg-blue-50/60 px-8 py-8 sm:px-10"></div>'
    + '</div>';

  document.getElementById('detail-back').addEventListener('click', function (e) { e.preventDefault(); show('results'); });
  renderChecklist();
  renderDetailCTA();
}

function renderChecklist() {
  var detail = getDetail(state.selectedCard);
  var list = document.getElementById('check-list');
  var prog = document.getElementById('check-progress');
  var fb = document.getElementById('check-feedback');
  if (!list) return;
  var total = detail.checklist.length;
  var answered = Object.keys(state.detailAnswers).length;

  prog.textContent = '각 질문에 예/아니오로 답해 신청 가능성을 가늠해 보세요. (' + answered + '/' + total + ')';

  list.innerHTML = detail.checklist.map(function (q, i) {
    var a = state.detailAnswers[i];
    var yesCls = a === 'yes' ? 'border-blue-600 bg-blue-600 text-white' : 'border-slate-200 bg-white text-slate-600 hover:border-blue-300';
    var noCls = a === 'no' ? 'border-slate-500 bg-slate-500 text-white' : 'border-slate-200 bg-white text-slate-600 hover:border-slate-300';
    return '<div class="rounded-2xl bg-white px-5 py-4 ring-1 ring-slate-100"><p class="text-lg font-semibold leading-snug text-slate-800">' + q + '</p><div class="mt-3 flex gap-2">'
      + '<button type="button" data-i="' + i + '" data-v="yes" class="chk-btn flex flex-1 items-center justify-center gap-1.5 rounded-xl border-2 py-3 text-lg font-bold transition focus:outline-none ' + yesCls + '">' + icon('check', {size:20, sw:3}) + '예</button>'
      + '<button type="button" data-i="' + i + '" data-v="no" class="chk-btn flex flex-1 items-center justify-center gap-1.5 rounded-xl border-2 py-3 text-lg font-bold transition focus:outline-none ' + noCls + '">' + icon('x', {size:20, sw:3}) + '아니오</button>'
      + '</div></div>';
  }).join('');

  Array.prototype.forEach.call(list.querySelectorAll('.chk-btn'), function (btn) {
    btn.addEventListener('click', function (e) {
      e.preventDefault();
      state.detailAnswers[Number(btn.getAttribute('data-i'))] = btn.getAttribute('data-v');
      renderChecklist();
    });
  });

  var allAnswered = Object.keys(state.detailAnswers).length === total;
  var allYes = allAnswered && detail.checklist.every(function (_, i) { return state.detailAnswers[i] === 'yes'; });
  if (allAnswered) {
    if (allYes) {
      fb.innerHTML = '<div class="fade-up mt-5 flex items-start gap-3 rounded-2xl bg-blue-600 px-5 py-4"><span class="text-white">' + icon('badge', {size:26}) + '</span><div><p class="text-lg font-bold text-white">회원님은 신청 자격을 충족할 가능성이 높습니다!</p><p class="mt-0.5 text-base text-blue-100">모든 항목을 충족했어요. 위 공식 사이트에서 바로 신청하거나, 아래에서 알림을 신청해 보세요.</p></div></div>';
    } else {
      fb.innerHTML = '<div class="fade-up mt-5 flex items-start gap-3 rounded-2xl bg-amber-100 px-5 py-4"><span class="text-amber-600">' + icon('alert', {size:26}) + '</span><div><p class="text-lg font-bold text-amber-800">일부 요건을 다시 확인해 보세요.</p><p class="mt-0.5 text-base text-amber-700">‘아니오’로 답한 항목이 있어요. 자격 요건을 다시 살펴보세요.</p></div></div>';
    }
  } else {
    fb.innerHTML = '';
  }
}

function renderDetailCTA() {
  var box = document.getElementById('detail-cta');
  var card = state.selectedCard;
  if (!box) return;
  if (state.detailSubscribed) {
    box.innerHTML = '<div class="fade-up flex flex-col items-center text-center"><div class="mb-4 flex h-16 w-16 items-center justify-center rounded-full bg-blue-600">' + icon('check', {size:36, sw:3, cls:'text-white'}) + '</div><h3 class="text-2xl font-bold text-slate-900">알림 신청이 완료되었습니다!</h3><p class="mt-2 text-lg leading-relaxed text-slate-600"><span class="font-semibold text-slate-800">' + card.title + '</span>의<br class="hidden sm:block"> 변경사항이 생기면 바로 알려드릴게요.</p><button type="button" id="detail-cta-home" class="mt-6 flex items-center justify-center gap-2 rounded-2xl border-2 border-slate-200 bg-white px-6 py-3.5 text-lg font-semibold text-slate-700 transition hover:border-blue-300 focus:outline-none focus:ring-4 focus:ring-blue-100">' + icon('home', {size:20}) + '처음으로 돌아가기</button></div>';
    document.getElementById('detail-cta-home').addEventListener('click', function (e) { e.preventDefault(); show('home'); });
  } else {
    box.innerHTML = '<div class="text-center"><h3 class="text-xl font-bold text-slate-900">이 공고의 변경사항, 놓치지 마세요</h3><p class="mt-2 text-base leading-relaxed text-slate-500">접수 시작·마감, 요건 변경 등 이 공고의 소식을 실시간으로 받아볼 수 있어요.</p><button type="button" id="detail-cta-sub" class="mt-5 flex w-full items-center justify-center gap-2 rounded-2xl bg-blue-600 py-5 text-xl font-bold text-white transition hover:bg-blue-700 focus:outline-none focus:ring-4 focus:ring-blue-200">' + icon('bell', {size:24}) + '이 공고 실시간 변경사항 알림받기</button></div>';
    document.getElementById('detail-cta-sub').addEventListener('click', function (e) { e.preventDefault(); state.detailSubscribed = true; renderDetailCTA(); });
  }
}

/* ===================== 초기화 ===================== */
document.addEventListener('DOMContentLoaded', function () {
  renderHome();
  show('home');
});
</script>
</body>
</html>
